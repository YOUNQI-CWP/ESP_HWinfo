; PlatformIO Project Configuration File
;
; ESP32 通用硬件信息检测项目
; 支持: ESP32 / ESP32-S2 / ESP32-S3 / ESP32-C3

[platformio]
description = ESP32 通用硬件信息检测项目
default_envs = esp32-s3-n16r8

; ---- ESP32 ----
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -Iinclude/hal_info -DCORE_DEBUG_LEVEL=3

; ---- ESP32-S2 ----
[env:esp32-s2-devkitm-1]
platform = espressif32
board = esp32-s2-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags = -Iinclude/hal_info -DCORE_DEBUG_LEVEL=3

; ---- ESP32-S3 (N16R8) ----
[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
build_flags = -Iinclude/hal_info -DBOARD_HAS_PSRAM -DCORE_DEBUG_LEVEL=3

; ---- ESP32-C3 ----
[env:esp32-c3-devkitc-02]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200
build_flags = -Iinclude/hal_info -DCORE_DEBUG_LEVEL=3
