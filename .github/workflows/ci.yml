name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-esp32:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env:
          - esp32-s3-n16r8
          - esp32
          - esp32-s2-devkitm-1
          - esp32-c3-devkitc-02

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: .pio/build/${{ matrix.env }}/firmware.bin

  build-esp8266:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build ESP8266
        run: pio run -c platformio_esp8266.ini

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp8266
          path: .pio/build/nodemcuv2/firmware.bin
