; PlatformIO Project Configuration File
;
; ESP8266 硬件信息检测项目
; 使用方式: pio run -c platformio_esp8266.ini

[platformio]
description = ESP8266 硬件信息检测项目
default_envs = nodemcuv2

; ---- NodeMCU V2 ----
[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
build_flags = -Iinclude/hal_info -DVERY_LOW_FLASH -DCORE_DEBUG_LEVEL=0

; ---- ESP-01S ----
[env:esp01s]
platform = espressif8266
board = esp01
framework = arduino
monitor_speed = 115200
build_flags = -Iinclude/hal_info -DVERY_LOW_FLASH -DCORE_DEBUG_LEVEL=0

; ---- WeMos D1 Mini ----
[env:wemos_d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
build_flags = -Iinclude/hal_info -DVERY_LOW_FLASH -DCORE_DEBUG_LEVEL=0
